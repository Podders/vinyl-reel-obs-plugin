name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15
    env:
      VINYL_REEL_INSTALL_PREFIX: ${{ github.workspace }}/release
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S ci -B build_macos -G Xcode -DCMAKE_INSTALL_PREFIX="${VINYL_REEL_INSTALL_PREFIX}" -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build_macos --config RelWithDebInfo --parallel

      - name: Install
        run: cmake --install build_macos --config RelWithDebInfo

      - name: Package
        run: |
          set -euo pipefail
          ROOT_DIR="$(pwd)"
          RELEASE_DIR="${ROOT_DIR}/release"
          ARTIFACT_DIR="${ROOT_DIR}/artifacts"
          mkdir -p "${ARTIFACT_DIR}"
          ditto -c -k --sequesterRsrc --keepParent \
            "${RELEASE_DIR}/vinyl-reel.plugin" \
            "${ARTIFACT_DIR}/vinyl-reel-macos.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: vinyl-reel-macos
          path: artifacts/vinyl-reel-macos.zip

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    env:
      VINYL_REEL_INSTALL_PREFIX: ${{ github.workspace }}\release
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: cmake -S ci -B build_windows -G "Visual Studio 17 2022" -A x64 -DCMAKE_INSTALL_PREFIX="$env:VINYL_REEL_INSTALL_PREFIX"

      - name: Build
        shell: pwsh
        run: cmake --build build_windows --config RelWithDebInfo --parallel

      - name: Install
        shell: pwsh
        run: cmake --install build_windows --config RelWithDebInfo

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $RootDir = Get-Location
          $ReleaseDir = Join-Path $RootDir 'release'
          $ArtifactDir = Join-Path $RootDir 'artifacts'
          New-Item -ItemType Directory -Force -Path $ArtifactDir | Out-Null
          $ZipPath = Join-Path $ArtifactDir 'vinyl-reel-windows.zip'
          if (Test-Path $ZipPath) { Remove-Item $ZipPath -Force }
          Compress-Archive -Path (Join-Path $ReleaseDir '*') -DestinationPath $ZipPath -Force

      - uses: actions/upload-artifact@v4
        with:
          name: vinyl-reel-windows
          path: artifacts/vinyl-reel-windows.zip

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Command ISCC.exe -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
          }

      - name: Build Installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Version = (Get-Content -Path ci/buildspec.json -Raw | ConvertFrom-Json).version
          .\scripts\package-windows-installer.ps1 -Version $Version

      - uses: actions/upload-artifact@v4
        with:
          name: vinyl-reel-windows-installer
          path: artifacts/vinyl-reel-*windows-setup.exe

  release:
    name: Publish Release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: vinyl-reel-macos
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: vinyl-reel-windows
          path: dist

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: vinyl-reel-windows-installer
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vinyl-reel-macos.zip
            dist/vinyl-reel-windows.zip
            dist/vinyl-reel-*windows-setup.exe
          draft: false
          generate_release_notes: true
